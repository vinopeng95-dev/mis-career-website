<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>彭韋諾｜設備工程師職涯</title> 

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Segoe UI','Noto Sans TC',system-ui;
    background:linear-gradient(135deg,#0f172a,#020617);
    color:white;
}

/* NAV */
nav{
    position:fixed;
    width:100%;
    display:flex;
    justify-content:center;
    gap:30px;
    padding:15px;
    backdrop-filter:blur(12px);
    background:rgba(0,0,0,0.4);
    z-index:999;
}

nav a{
    color:#cbd5e1;
    text-decoration:none;
    transition:.3s;
    font-weight:500;
}

nav a:hover{
    color:#f59e0b;
}

/* HERO */
.hero{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    position:relative;
}

.hero::before{
    content:'';
    position:absolute;
    width:300px;
    height:300px;
    background:#f59e0b;
    filter:blur(120px);
    opacity:.3;
    border-radius:50%;
}

.hero h1{
    font-size:3.8rem;
    letter-spacing:2px;
}

.hero span{
    color:#f59e0b;
}

.hero p{
    margin:20px 0 25px;
    opacity:.8;
    font-size:1.2rem;
}

.btn-group{
    display:flex;
    gap:18px;
    justify-content:center;
    flex-wrap:wrap;
}

.btn{
    padding:12px 28px;
    background:#f59e0b;
    border-radius:40px;
    text-decoration:none;
    color:#0f172a;
    font-weight:bold;
    transition:.3s;
    display:inline-block;
}

.btn-outline{
    background:transparent;
    border:1.5px solid #f59e0b;
    color:#f59e0b;
}

.btn-outline:hover{
    background:#f59e0b;
    color:#0f172a;
}

.btn:hover{
    transform:scale(1.05);
}

/* SECTION */
.section{
    padding:100px 20px;
    text-align:center;
}

.section h2{
    margin-bottom:50px;
    font-size:2rem;
    position:relative;
    display:inline-block;
}

.section h2::after{
    content:'';
    position:absolute;
    bottom:-12px;
    left:50%;
    transform:translateX(-50%);
    width:60px;
    height:3px;
    background:#f59e0b;
    border-radius:3px;
}

/* 卡片區 */
.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:35px;
    max-width:1100px;
    margin:auto;
}

.card{
    background:#1e293b;
    padding:35px 25px;
    border-radius:24px;
    transition:.3s;
    border:1px solid rgba(255,255,255,0.08);
}

.card:hover{
    transform:translateY(-10px);
    box-shadow:0 20px 35px rgba(0,0,0,.4);
    border-color:rgba(245,158,11,0.3);
}

.card h3{
    margin-bottom:15px;
    font-size:1.6rem;
    color:#f59e0b;
}

.card p{
    opacity:.8;
    margin-bottom:25px;
    line-height:1.6;
}

.link-btn{
    display:inline-block;
    padding:10px 28px;
    border-radius:40px;
    background:#334155;
    color:white;
    text-decoration:none;
    transition:.3s;
    font-weight:500;
}

.link-btn:hover{
    background:#f59e0b;
    color:#0f172a;
}

/* FOOTER */
footer{
    text-align:center;
    padding:40px;
    background:#020617;
    color:#94a3b8;
    border-top:1px solid rgba(255,255,255,0.05);
}

@media (max-width:768px){
    .hero h1{font-size:2.5rem;}
    nav{gap:20px;font-size:0.9rem;}
    .section{padding:60px 16px;}
    .card{padding:25px 20px;}
}
</style>
</head>
<body>

<nav>
    <a href="#home">首頁</a>
    <a href="#cards-section">探索</a>
</nav>

<section class="hero" id="home">
    <div>
        <h1>彭韋諾<span>.</span></h1>
        <p>設備工程師 | 精密機械 x 故障排除 x 製程優化</p>
        <div class="btn-group">
            <a href="https://www.104.com.tw/job/90jbl?jobsource=index_s" target="_blank" class="btn">🔧 104 應徵設備工程師</a>
            <a href="about.html" class="btn btn-outline">📄 關於我</a>
        </div>
    </div>
</section>

<section class="section" id="cards-section">
    <h2>我的職涯探索</h2>
    <div class="cards">
        <div class="card">
            <h3>📊 何倫碼分析</h3>
            <p>RIC 實作研究型 — 與設備工程師高度契合，喜歡動手解決問題並優化流程。</p>
            <a href="holland.html" class="link-btn">查看報告 →</a>
        </div>
        <div class="card">
            <h3>📄 關於我</h3>
            <p>資管系學生，熱愛硬體設備與自動化控制，目標成為頂尖設備工程師。</p>
            <a href="about.html" class="link-btn">了解更多 →</a>
        </div>
        <div class="card">
            <h3>📑 專業履歷</h3>
            <p>技能專長、證照規劃與職涯目標 — 持續精進，邁向設備專家。</p>
            <a href="resume.html" class="link-btn">檢視履歷 →</a>
        </div>
    </div>
</section>

<footer>
    <p>© 2026 彭韋諾｜設備工程師職涯網站</p>
</footer>

</body>
</html>
