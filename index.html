<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>彭韋諾｜設備工程師</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Noto Sans TC', sans-serif;
    background: linear-gradient(135deg, #eef2ff, #f8fafc);
    color: #1e293b;
}

/* NAV */
nav {
    position: fixed;
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 1rem 2rem;
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(10px);
    box-shadow: 0 4px 20px rgba(0,0,0,0.05);
}

nav .logo {
    font-weight: bold;
    color: #6366f1;
}

nav a {
    margin-left: 1.5rem;
    text-decoration: none;
    color: #475569;
    transition: 0.3s;
}

nav a:hover {
    color: #6366f1;
}

/* HERO */
.hero {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
}

.hero-box {
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(20px);
    border-radius: 30px;
    padding: 3rem;
    text-align: center;
    box-shadow: 0 20px 40px rgba(0,0,0,0.08);
}

.hero h1 {
    font-size: 3.5rem;
    background: linear-gradient(135deg, #6366f1, #22c55e);
    -webkit-background-clip: text;
    color: transparent;
}

.hero p {
    margin: 1rem 0 2rem;
    color: #64748b;
}

/* BUTTON */
.btn {
    padding: 0.8rem 2rem;
    border-radius: 50px;
    margin: 0 0.5rem;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
}

.btn-primary {
    background: linear-gradient(135deg, #6366f1, #22c55e);
    color: white;
}

.btn-primary:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 20px rgba(99,102,241,0.3);
}

.btn-outline {
    border: 2px solid #6366f1;
    color: #6366f1;
}

.btn-outline:hover {
    background: #6366f1;
    color: white;
}

/* SECTION */
.section {
    padding: 5rem 2rem;
    text-align: center;
}

.section h2 {
    font-size: 2rem;
    margin-bottom: 2rem;
    color: #334155;
}

/* CARDS */
.cards {
    display: flex;
    gap: 2rem;
    justify-content: center;
    flex-wrap: wrap;
}

.card {
    width: 300px;
    padding: 2rem;
    border-radius: 25px;
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(15px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-10px) scale(1.03);
}

.card h3 {
    color: #6366f1;
    margin: 1rem 0;
}

.card p {
    font-size: 0.9rem;
    color: #64748b;
}

.card a {
    display: inline-block;
    margin-top: 1rem;
    color: #22c55e;
    text-decoration: none;
    font-weight: bold;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 2rem;
    color: #94a3b8;
}

/* RWD */
@media(max-width:768px){
    .hero h1 { font-size: 2.2rem; }
}
</style>
</head>

<body>

<nav>
    <div class="logo">Vino</div>
    <div>
        <a href="#home">首頁</a>
        <a href="#explore">探索</a>
        <a href="about.html">關於</a>
    </div>
</nav>

<section class="hero" id="home">
    <div class="hero-box">
        <h1>彭韋諾</h1>
        <p>設備工程師｜機械 × 製程 × 自動化</p>
        <a href="#" class="btn btn-primary">應徵職缺</a>
        <a href="about.html" class="btn btn-outline">認識我</a>
    </div>
</section>

<section class="section" id="explore">
    <h2>職涯探索</h2>

    <div class="cards">
        <div class="card">
            <h3>何倫碼分析</h3>
            <p>RIC類型，適合工程與問題解決導向職業。</p>
            <a href="holland.html">查看 →</a>
        </div>

        <div class="card">
            <h3>關於我</h3>
            <p>資管系學生，目標設備工程師。</p>
            <a href="about.html">了解 →</a>
        </div>

        <div class="card">
            <h3>履歷</h3>
            <p>技能、證照與未來規劃。</p>
            <a href="resume.html">查看 →</a>
        </div>
    </div>
</section>

<footer>
    © 2026 彭韋諾
</footer>

</body>
</html>
