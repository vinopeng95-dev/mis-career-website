<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>彭韋諾｜設備工程師</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', 'Noto Sans TC', system-ui, -apple-system, sans-serif;
    background: #0d111c;
    color: #eaeef5;
}

/* 幾何背景 */
.bg-geo {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -2;
    background: linear-gradient(145deg, #0a0f1a 0%, #111827 100%);
}
.bg-geo::before {
    content: '';
    position: absolute;
    width: 80vmax;
    height: 80vmax;
    background: radial-gradient(circle, rgba(80, 200, 150, 0.08), transparent 70%);
    top: -30vmax;
    right: -20vmax;
    border-radius: 50%;
}
.bg-geo::after {
    content: '';
    position: absolute;
    width: 60vmax;
    height: 60vmax;
    background: radial-gradient(circle, rgba(230, 150, 80, 0.06), transparent 70%);
    bottom: -20vmax;
    left: -20vmax;
    border-radius: 50%;
}

/* 導航 - 右側垂直 */
nav {
    position: fixed;
    right: 2rem;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 0.8rem;
    z-index: 100;
    background: rgba(20, 25, 45, 0.7);
    backdrop-filter: blur(12px);
    padding: 1rem 0.6rem;
    border-radius: 50px;
    border: 1px solid rgba(80, 200, 150, 0.3);
}

nav a {
    color: #9aa5c0;
    text-decoration: none;
    font-size: 0.75rem;
    padding: 0.5rem 0.7rem;
    border-radius: 40px;
    transition: 0.25s;
    text-align: center;
    writing-mode: horizontal-tb;
    font-weight: 500;
}

nav a:hover {
    color: #50c896;
    background: rgba(80, 200, 150, 0.15);
}

/* 主內容 */
.main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 3rem 4rem 3rem 3rem;
}

/* Hero */
.hero {
    min-height: 85vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.hero-badge {
    background: rgba(80, 200, 150, 0.2);
    display: inline-block;
    padding: 0.25rem 1rem;
    border-radius: 50px;
    font-size: 0.7rem;
    color: #50c896;
    letter-spacing: 2px;
    margin-bottom: 1.2rem;
    width: fit-content;
}

.hero h1 {
    font-size: 3.8rem;
    font-weight: 800;
    line-height: 1.2;
    margin-bottom: 1rem;
}

.hero h1 span {
    color: #e69650;
    text-shadow: 0 0 8px rgba(230, 150, 80, 0.3);
}

.hero-desc {
    font-size: 1rem;
    color: #a5b0c8;
    max-width: 500px;
    margin-bottom: 2rem;
    line-height: 1.6;
}

.btn-group {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
}

.btn {
    padding: 0.75rem 2rem;
    border-radius: 50px;
    text-decoration: none;
    font-weight: 600;
    transition: 0.25s;
}

.btn-primary {
    background: #e69650;
    color: #0d111c;
    border: none;
}

.btn-primary:hover {
    background: #da823a;
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(230, 150, 80, 0.3);
}

.btn-outline {
    border: 1.5px solid #50c896;
    color: #50c896;
    background: transparent;
}

.btn-outline:hover {
    background: rgba(80, 200, 150, 0.1);
    transform: translateY(-2px);
}

/* 卡片區 */
.section-title {
    font-size: 1.8rem;
    margin: 3rem 0 2rem;
    position: relative;
    display: inline-block;
}

.section-title::before {
    content: '';
    position: absolute;
    bottom: -6px;
    left: 0;
    width: 45%;
    height: 3px;
    background: #e69650;
    border-radius: 3px;
}

.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 2rem;
    margin-top: 1rem;
}

.card {
    background: rgba(25, 32, 55, 0.7);
    backdrop-filter: blur(8px);
    border-radius: 28px;
    padding: 2rem;
    border: 1px solid rgba(80, 200, 150, 0.2);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-8px);
    border-color: rgba(80, 200, 150, 0.6);
    background: rgba(35, 42, 70, 0.8);
}

.card-icon {
    font-size: 2.5rem;
    margin-bottom: 1rem;
}

.card h3 {
    font-size: 1.4rem;
    margin-bottom: 0.8rem;
    color: #50c896;
}

.card p {
    color: #b0bacf;
    line-height: 1.5;
    margin-bottom: 1.5rem;
    font-size: 0.9rem;
}

.card-link {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    color: #e69650;
    text-decoration: none;
    font-weight: 500;
    font-size: 0.9rem;
    transition: 0.2s;
}

.card-link:hover {
    gap: 0.8rem;
    color: #f0a86a;
}

footer {
    text-align: center;
    padding: 2rem;
    color: #6a738b;
    font-size: 0.7rem;
    border-top: 1px solid rgba(80, 200, 150, 0.1);
    margin-top: 3rem;
}

@media (max-width: 768px) {
    nav {
        position: fixed;
        bottom: 1.5rem;
        top: auto;
        left: 50%;
        transform: translateX(-50%);
        flex-direction: row;
        background: rgba(20, 25, 45, 0.9);
        padding: 0.5rem 1rem;
        gap: 0.5rem;
    }
    .main {
        padding: 2rem 1.5rem;
    }
    .hero h1 {
        font-size: 2.5rem;
    }
}
</style>
</head>
<body>

<div class="bg-geo"></div>

<nav>

</nav>

    <div class="hero">
        <div class="hero-badge">EQUIPMENT ENGINEER</div>
        <h1>彭韋諾<br><span>精密機械 · 故障排除</span></h1>
        <div class="hero-desc">從資訊管理跨足設備工程，以實作與分析能力，成為產線最信賴的技術專家。</div>
        <div class="btn-group">
            <a href="https://www.104.com.tw/job/90jbl?jobsource=index_s" target="_blank" class="btn btn-primary">🔧 104 應徵職缺</a>
            <a href="about.html" class="btn btn-outline">📄 認識我</a>
        </div>
    </div>

    <div class="section-title" id="explore">職涯探索</div>
    <div class="cards">
        <div class="card">
            <div class="card-icon">📊</div>
            <h3>何倫碼分析</h3>
            <p>RIC 實作研究型 — 與設備工程師高度契合，喜歡動手解決問題並優化流程。</p>
            <a href="holland.html" class="card-link">查看報告 →</a>
        </div>
        <div class="card">
            <div class="card-icon">👤</div>
            <h3>關於我</h3>
            <p>資管系學生，熱愛硬體設備與自動化控制，目標成為頂尖設備工程師。</p>
            <a href="about.html" class="card-link">了解更多 →</a>
        </div>
        <div class="card">
            <div class="card-icon">📑</div>
            <h3>專業履歷</h3>
            <p>技能專長、證照規劃與職涯目標 — 持續精進，邁向設備專家。</p>
            <a href="resume.html" class="card-link">檢視履歷 →</a>
        </div>
    </div>

    <footer>
        <p>© 2026 彭韋諾｜設備工程師職涯網站</p>
    </footer>
</div>
</body>
</html>
