<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>彭韋諾｜設備工程師</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', 'Noto Sans TC', system-ui, -apple-system, sans-serif;
    background: #1a1a2e;
    color: #eee;
}

/* 動態波浪背景 */
.wave-bg {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -2;
    background: linear-gradient(125deg, #16213e 0%, #0f0f1f 100%);
}

.wave-bg svg {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 40%;
    opacity: 0.25;
}

/* 導航 - 側邊垂直式 */
nav {
    position: fixed;
    left: 2rem;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 1.2rem;
    z-index: 100;
    background: rgba(30, 30, 50, 0.6);
    backdrop-filter: blur(12px);
    padding: 1.2rem 0.8rem;
    border-radius: 60px;
    border: 1px solid rgba(255, 160, 80, 0.3);
}

nav a {
    color: #aaa;
    text-decoration: none;
    font-size: 0.8rem;
    writing-mode: horizontal-tb;
    padding: 0.5rem 0.8rem;
    border-radius: 40px;
    transition: 0.25s;
    text-align: center;
    font-weight: 500;
}

nav a:hover {
    color: #ffa050;
    background: rgba(255, 160, 80, 0.15);
}

/* 主內容 */
.main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 4rem 3rem 4rem 8rem;
}

/* Hero 區塊 */
.hero {
    min-height: 85vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.hero-badge {
    background: rgba(255, 160, 80, 0.2);
    display: inline-block;
    padding: 0.3rem 1rem;
    border-radius: 40px;
    font-size: 0.7rem;
    color: #ffa050;
    letter-spacing: 1px;
    margin-bottom: 1rem;
    width: fit-content;
}

.hero h1 {
    font-size: 4rem;
    font-weight: 800;
    line-height: 1.2;
    margin-bottom: 1rem;
}

.hero h1 span {
    color: #ffa050;
    text-shadow: 0 0 10px rgba(255, 160, 80, 0.3);
}

.hero-desc {
    font-size: 1.1rem;
    color: #bbb;
    max-width: 550px;
    margin-bottom: 2rem;
}

.btn-group {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
}

.btn {
    padding: 0.8rem 2rem;
    border-radius: 50px;
    text-decoration: none;
    font-weight: 600;
    transition: 0.25s;
}

.btn-primary {
    background: #ffa050;
    color: #1a1a2e;
    border: none;
}

.btn-primary:hover {
    background: #ff8c2a;
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(255, 160, 80, 0.3);
}

.btn-outline {
    border: 1.5px solid #ffa050;
    color: #ffa050;
    background: transparent;
}

.btn-outline:hover {
    background: rgba(255, 160, 80, 0.1);
    transform: translateY(-2px);
}

/* 卡片區 */
.section-title {
    font-size: 2rem;
    margin: 3rem 0 2rem;
    position: relative;
    display: inline-block;
}

.section-title::after {
    content: '';
    position: absolute;
    bottom: -8px;
    left: 0;
    width: 60%;
    height: 3px;
    background: #ffa050;
    border-radius: 3px;
}

.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 2rem;
    margin-top: 1rem;
}

.card {
    background: rgba(30, 30, 50, 0.7);
    backdrop-filter: blur(8px);
    border-radius: 28px;
    padding: 2rem;
    border: 1px solid rgba(255, 160, 80, 0.2);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-8px);
    border-color: rgba(255, 160, 80, 0.6);
    background: rgba(40, 40, 65, 0.8);
}

.card-icon {
    font-size: 2.5rem;
    margin-bottom: 1rem;
}

.card h3 {
    font-size: 1.4rem;
    margin-bottom: 0.8rem;
    color: #ffa050;
}

.card p {
    color: #bbb;
    line-height: 1.5;
    margin-bottom: 1.5rem;
    font-size: 0.9rem;
}

.card-link {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    color: #ffa050;
    text-decoration: none;
    font-weight: 500;
    font-size: 0.9rem;
}

.card-link:hover {
    gap: 0.8rem;
}

footer {
    text-align: center;
    padding: 2rem;
    color: #777;
    font-size: 0.75rem;
    border-top: 1px solid rgba(255, 160, 80, 0.1);
    margin-top: 2rem;
}

@media (max-width: 768px) {
    nav {
        position: fixed;
        bottom: 1rem;
        top: auto;
        left: 50%;
        transform: translateX(-50%);
        flex-direction: row;
        background: rgba(30, 30, 50, 0.9);
        padding: 0.5rem 1rem;
        gap: 0.5rem;
    }
    .main {
        padding: 2rem 1.5rem;
    }
    .hero h1 {
        font-size: 2.5rem;
    }
}
</style>
</head>
