<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>彭韋諾 · 何倫碼分析</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Noto Sans TC', sans-serif;
    background: linear-gradient(135deg, #eef2ff, #f8fafc);
    color: #1e293b;
}

/* 背景光暈 */
.bg-glow::before,
.bg-glow::after {
    content: '';
    position: fixed;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    filter: blur(120px);
    z-index: -1;
}

.bg-glow::before {
    background: #6366f1;
    top: -100px;
    left: -100px;
}

.bg-glow::after {
    background: #22c55e;
    bottom: -100px;
    right: -100px;
}

.container {
    max-width: 1100px;
    margin: auto;
    padding: 2rem;
}

/* 返回 */
.top-nav {
    text-align: right;
    margin-bottom: 2rem;
}

.back-link {
    padding: 0.5rem 1.5rem;
    border-radius: 50px;
    background: white;
    box-shadow: 0 5px 15px rgba(0,0,0,0.08);
    text-decoration: none;
    color: #6366f1;
    font-weight: bold;
}

/* 標題 */
.header {
    text-align: center;
    margin-bottom: 3rem;
}

.header h1 {
    font-size: 2.5rem;
    background: linear-gradient(135deg, #6366f1, #22c55e);
    -webkit-background-clip: text;
    color: transparent;
}

/* 主卡片 */
.main-card {
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(20px);
    border-radius: 30px;
    padding: 2.5rem;
    text-align: center;
    box-shadow: 0 20px 40px rgba(0,0,0,0.08);
    margin-bottom: 2rem;
}

.big-code {
    font-size: 5rem;
    font-weight: 800;
    background: linear-gradient(135deg, #6366f1, #22c55e);
    -webkit-background-clip: text;
    color: transparent;
}

.result-sub {
    color: #6366f1;
    margin: 1rem 0;
}

.result-text {
    color: #475569;
    line-height: 1.6;
}

/* 技能標籤 */
.pills {
    margin-top: 1.5rem;
}

.pill {
    display: inline-block;
    margin: 0.3rem;
    padding: 0.3rem 1rem;
    border-radius: 50px;
    background: #6366f1;
    color: white;
    font-size: 0.8rem;
}

/* 量表區 */
.stats {
    display: grid;
    gap: 1rem;
}

.stat {
    background: rgba(255,255,255,0.7);
    border-radius: 20px;
    padding: 1rem;
    box-shadow: 0 10px 20px rgba(0,0,0,0.05);
}

.stat-top {
    display: flex;
    justify-content: space-between;
    margin-bottom: 0.5rem;
}

.stat-name {
    font-weight: bold;
}

.bar {
    height: 10px;
    background: #e2e8f0;
    border-radius: 10px;
    overflow: hidden;
}

.bar-fill {
    height: 100%;
    width: 0;
    border-radius: 10px;
    background: linear-gradient(90deg, #6366f1, #22c55e);
    transition: 1s;
}

/* Footer */
.footer {
    margin-top: 2rem;
    text-align: center;
    color: #64748b;
}

</style>
</head>

<body class="bg-glow">

<div class="container">

    <div class="top-nav">
        <a href="index.html" class="back-link">← 返回主頁</a>
    </div>

    <div class="header">
        <h1>何倫碼分析</h1>
    </div>

    <div class="main-card">
        <div class="big-code">RIC</div>
        <div class="result-sub">實用型 × 研究型 × 常規型</div>
        <div class="result-text">
            你擅長動手操作與分析問題，並透過流程優化提升效率，
            非常適合設備工程師與製程相關職位。
        </div>

        <div class="pills">
            <span class="pill">動手實作</span>
            <span class="pill">數據分析</span>
            <span class="pill">流程優化</span>
        </div>
    </div>

    <div class="stats">
        <div class="stat">
            <div class="stat-top"><span>R 實用型</span><span>88%</span></div>
            <div class="bar"><div class="bar-fill" data-width="88%"></div></div>
        </div>

        <div class="stat">
            <div class="stat-top"><span>I 研究型</span><span>72%</span></div>
            <div class="bar"><div class="bar-fill" data-width="72%"></div></div>
        </div>

        <div class="stat">
            <div class="stat-top"><span>C 常規型</span><span>65%</span></div>
            <div class="bar"><div class="bar-fill" data-width="65%"></div></div>
        </div>

        <div class="stat">
            <div class="stat-top"><span>E 企業型</span><span>48%</span></div>
            <div class="bar"><div class="bar-fill" data-width="48%"></div></div>
        </div>

        <div class="stat">
            <div class="stat-top"><span>S 社會型</span><span>42%</span></div>
            <div class="bar"><div class="bar-fill" data-width="42%"></div></div>
        </div>

        <div class="stat">
            <div class="stat-top"><span>A 藝術型</span><span>35%</span></div>
            <div class="bar"><div class="bar-fill" data-width="35%"></div></div>
        </div>
    </div>

    <div class="footer">
        📌 適合職業：設備工程師、製程工程師、機械工程
    </div>

</div>

<script>
const bars = document.querySelectorAll('.bar-fill');

window.onload = () => {
    bars.forEach(bar => {
        let width = bar.getAttribute('data-width');
        setTimeout(() => {
            bar.style.width = width;
        }, 200);
    });
};
</script>

</body>
</html>
