<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>彭韋諾 · 何倫碼分析</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0c0f18;
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            color: #eef2ff;
        }

        /* 頂部返回列 */
        .top-bar {
            padding: 1rem 2rem;
            background: rgba(12, 15, 24, 0.9);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid rgba(80, 200, 150, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .back-btn {
            background: rgba(80, 200, 150, 0.1);
            border: 1px solid #50c896;
            padding: 0.4rem 1.2rem;
            border-radius: 30px;
            color: #50c896;
            text-decoration: none;
            font-size: 0.85rem;
            transition: 0.25s;
        }
        .back-btn:hover {
            background: #50c896;
            color: #0c0f18;
        }

        /* 主容器 */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* 上方結果卡 - 大面積 */
        .hero-card {
            background: linear-gradient(145deg, #141b2a, #0f1322);
            border-radius: 2rem;
            padding: 2.5rem;
            text-align: center;
            margin-bottom: 2.5rem;
            border: 1px solid rgba(80, 200, 150, 0.2);
        }
        .big-code {
            font-size: 5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #50c896, #e69650);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            line-height: 1;
        }
        .hero-title {
            font-size: 1.3rem;
            font-weight: 500;
            margin: 0.5rem 0 1rem;
            color: #50c896;
        }
        .hero-text {
            color: #a5b0c8;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
        }
        .pill-group {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            justify-content: center;
            margin-top: 1.5rem;
        }
        .pill {
            background: rgba(80, 200, 150, 0.15);
            padding: 0.3rem 1rem;
            border-radius: 30px;
            font-size: 0.75rem;
        }

        /* 下方橫向捲動量表 */
        .section-title {
            font-size: 1.2rem;
            margin-bottom: 1.2rem;
            color: #e69650;
            letter-spacing: 1px;
        }
        .stats-scroll {
            overflow-x: auto;
            padding-bottom: 0.5rem;
        }
        .stats {
            display: flex;
            gap: 1rem;
            min-width: 600px;
        }
        .stat-card {
            flex: 1;
            min-width: 140px;
            background: rgba(20, 28, 48, 0.7);
            border-radius: 1.2rem;
            padding: 1.2rem;
            text-align: center;
            border: 1px solid rgba(80, 200, 150, 0.15);
            transition: 0.2s;
        }
        .stat-card.highlight {
            border-left: 3px solid #e69650;
            background: rgba(80, 200, 150, 0.05);
        }
        .stat-code {
            font-size: 1.8rem;
            font-weight: 700;
            color: #e69650;
        }
        .stat-name {
            font-size: 0.7rem;
            color: #8a95b5;
            margin-bottom: 1rem;
        }
        .stat-bar {
            width: 100%;
            height: 6px;
            background: #262e48;
            border-radius: 10px;
            margin: 0.8rem 0;
            overflow: hidden;
        }
        .stat-fill {
            height: 100%;
            border-radius: 10px;
            background: linear-gradient(90deg, #50c896, #e69650);
            width: 0%;
            transition: width 1s ease;
        }
        .stat-score {
            font-weight: 600;
            font-size: 1rem;
            color: #50c896;
        }

        .footer-note {
            margin-top: 2rem;
            padding: 1rem;
            background: rgba(20, 28, 48, 0.5);
            border-radius: 1rem;
            text-align: center;
            font-size: 0.75rem;
            color: #7a85a8;
        }

        @media (max-width: 700px) {
            .big-code { font-size: 3.5rem; }
            .hero-card { padding: 1.5rem; }
        }
    </style>
</head>
<body>

<div class="top-bar">
    <div></div>
    <a href="index.html" class="back-btn">← 返回主頁</a>
</div>

<div class="container">
    <div class="hero-card">
        <div class="big-code">RIC</div>
        <div class="hero-title">實用型 · 研究型 · 常規型</div>
        <div class="hero-text">
            我的核心特質為 <strong>實用型 (R)</strong>，搭配研究型 (I) 與常規型 (C)。<br>
            喜歡動手操作、分析問題根源，並透過標準化流程提升效率 — 與設備工程師職務完美契合。
        </div>
        <div class="pill-group">
            <span class="pill">🔧 動手實作</span>
            <span class="pill">📊 數據分析</span>
            <span class="pill">📋 標準流程</span>
        </div>
    </div>

    <div class="section-title">📈 六型人格傾向</div>
    <div class="stats-scroll">
        <div class="stats">
            <div class="stat-card highlight">
                <div class="stat-code">R</div>
                <div class="stat-name">實用型</div>
                <div class="stat-bar"><div class="stat-fill" style="width: 88%;"></div></div>
                <div class="stat-score">88%</div>
            </div>
            <div class="stat-card">
                <div class="stat-code">I</div>
                <div class="stat-name">研究型</div>
                <div class="stat-bar"><div class="stat-fill" style="width: 72%;"></div></div>
                <div class="stat-score">72%</div>
            </div>
            <div class="stat-card">
                <div class="stat-code">C</div>
                <div class="stat-name">常規型</div>
                <div class="stat-bar"><div class="stat-fill" style="width: 65%;"></div></div>
                <div class="stat-score">65%</div>
            </div>
            <div class="stat-card">
                <div class="stat-code">E</div>
                <div class="stat-name">企業型</div>
                <div class="stat-bar"><div class="stat-fill" style="width: 48%;"></div></div>
                <div class="stat-score">48%</div>
            </div>
            <div class="stat-card">
                <div class="stat-code">S</div>
                <div class="stat-name">社會型</div>
                <div class="stat-bar"><div class="stat-fill" style="width: 42%;"></div></div>
                <div class="stat-score">42%</div>
            </div>
            <div class="stat-card">
                <div class="stat-code">A</div>
                <div class="stat-name">藝術型</div>
                <div class="stat-bar"><div class="stat-fill" style="width: 35%;"></div></div>
                <div class="stat-score">35%</div>
            </div>
        </div>
    </div>

    <div class="footer-note">
        📌 <strong>RIC 職涯建議</strong>：適合設備工程師、製程工程師、機械維護工程師 — 在半導體或高科技製造業中發揮所長。
    </div>
</div>

<script>
    const fills = document.querySelectorAll('.stat-fill');
    window.addEventListener('load', () => {
        fills.forEach(f => {
            const w = f.style.width;
            f.style.width = '0%';
            setTimeout(() => { f.style.width = w; }, 100);
        });
    });
</script>
</body>
</html>
