<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>彭韋諾 · 履歷</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #0b0f1a;
    font-family: 'Noto Sans TC', sans-serif;
    color: #e2e8f0;
}

/* NAV */
.nav {
    display: flex;
    justify-content: space-between;
    padding: 1.2rem 2rem;
    background: rgba(15,20,35,0.8);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(100,150,255,0.2);
}

.nav a {
    color: #94a3b8;
    text-decoration: none;
}

.nav a:hover {
    color: #60a5fa;
}

/* HERO */
.hero {
    text-align: center;
    padding: 3rem 2rem;
}

.hero h1 {
    font-size: 2.5rem;
    background: linear-gradient(135deg,#60a5fa,#22c55e);
    -webkit-background-clip: text;
    color: transparent;
}

.hero p {
    color: #94a3b8;
}

/* SECTION */
.section {
    max-width: 1000px;
    margin: auto;
    padding: 2.5rem 1.5rem;
}

.section h2 {
    color: #60a5fa;
    margin-bottom: 1rem;
}

/* 卡片 */
.card {
    background: rgba(20,25,45,0.6);
    border: 1px solid rgba(100,150,255,0.15);
    border-radius: 20px;
    padding: 1.5rem;
    margin-bottom: 1rem;
    transition: 0.3s;
}

.card:hover {
    border-color: #60a5fa;
    transform: translateY(-3px);
}

/* 技能 */
.skills {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
}

.skill {
    background: rgba(96,165,250,0.15);
    color: #60a5fa;
    padding: 0.3rem 0.9rem;
    border-radius: 50px;
    font-size: 0.8rem;
}

/* 經歷 */
.job-title {
    font-weight: bold;
}

.job-time {
    font-size: 0.8rem;
    color: #94a3b8;
}

/* footer */
.footer {
    text-align: center;
    padding: 2rem;
    color: #64748b;
}

</style>
</head>

<body>

<div class="nav">
    <div>Resume</div>
    <a href="index.html">← 返回主頁</a>
</div>

<div class="hero">
    <h1>設備工程師履歷</h1>
    <p>機械 × 製程 × 自動化</p>
</div>

<div class="section">

    <h2>📌 個人摘要</h2>
    <div class="card">
        專注於設備維護與製程優化，具備故障排除與數據分析能力，
        致力於提升設備穩定度與產線效率。
    </div>

    <h2>🛠 技能專長</h2>
    <div class="card">
        <div class="skills">
            <span class="skill">設備維護</span>
            <span class="skill">故障排除</span>
            <span class="skill">自動化控制</span>
            <span class="skill">PLC</span>
            <span class="skill">Excel</span>
            <span class="skill">Python</span>
        </div>
    </div>

    <h2>💼 經歷</h2>
    <div class="card">
        <div class="job-title">設備學習與專題實作</div>
        <div class="job-time">2024 - 現在</div>
        <ul>
            <li>學習設備維護與基本機械原理</li>
            <li>進行故障分析與排除練習</li>
            <li>使用數據分析提升效率</li>
        </ul>
    </div>

    <h2>🎯 未來目標</h2>
    <div class="card">
        進入半導體或高科技產業，成為專業設備工程師，
        持續精進技術並提升產線效率。
    </div>

</div>

<div class="footer">
    © 2026 彭韋諾
</div>

</body>
</html>
