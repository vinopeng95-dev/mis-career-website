<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>彭韋諾 · 設備工程師履歷</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #0e121f;
    font-family: 'Plus Jakarta Sans', 'Noto Sans TC', sans-serif;
    color: #eef2ff;
}

/* 導航 */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1rem 2.5rem;
    background: rgba(14, 18, 31, 0.95);
    backdrop-filter: blur(10px);
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 1px solid rgba(90, 150, 200, 0.3);
    flex-wrap: wrap;
}
.logo {
    font-size: 1.3rem;
    font-weight: 700;
    background: linear-gradient(135deg, #e0e8ff, #5a96c8);
    background-clip: text;
    -webkit-background-clip: text;
    color: transparent;
}
.nav-items {
    display: flex;
    gap: 1.5rem;
    align-items: center;
}
.nav-items a {
    color: #b8c5e0;
    text-decoration: none;
    transition: 0.2s;
}
.nav-items a:hover {
    color: #5a96c8;
}
.back-home {
    background: rgba(90, 150, 200, 0.15);
    border: 1px solid #5a96c8;
    padding: 0.4rem 1.2rem;
    border-radius: 50px;
    color: #5a96c8;
}
.back-home:hover {
    background: #5a96c8;
    color: #0e121f;
}

/* Hero */
.hero {
    text-align: center;
    padding: 3rem 2rem;
    background: radial-gradient(ellipse at 50% 0%, rgba(90,150,200,0.12), transparent);
}
.hero h1 {
    font-size: 2.8rem;
    font-weight: 700;
    background: linear-gradient(135deg, #ffffff, #5a96c8);
    background-clip: text;
    -webkit-background-clip: text;
    color: transparent;
}
.hero p {
    color: #94a3c0;
    margin-top: 0.3rem;
}

/* 區塊 */
.section {
    max-width: 1100px;
    margin: 0 auto;
    padding: 3rem 2rem;
    border-bottom: 1px solid rgba(90, 150, 200, 0.15);
}
.section h2 {
    font-size: 1.5rem;
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 0.6rem;
    color: #5a96c8;
}

/* 卡片群 */
.grid-cards {
    display: flex;
    gap: 1.5rem;
    flex-wrap: wrap;
}
.grid-card {
    flex: 1;
    min-width: 230px;
    background: rgba(25, 30, 48, 0.7);
    border-radius: 1.5rem;
    padding: 1.5rem;
    border: 1px solid rgba(90, 150, 200, 0.2);
    transition: 0.25s;
}
.grid-card:hover {
    border-color: rgba(90, 150, 200, 0.6);
    transform: translateY(-4px);
}
.grid-card h3 {
    color: #5a96c8;
    margin-bottom: 0.8rem;
}
.grid-card p, .grid-card li {
    color: #c0cae0;
    font-size: 0.9rem;
    line-height: 1.5;
}
.grid-card ul {
    padding-left: 1.2rem;
    margin-top: 0.5rem;
}

/* 工作區塊 */
.job-box {
    background: rgba(25, 30, 48, 0.6);
    border-radius: 1.5rem;
    padding: 1.8rem;
