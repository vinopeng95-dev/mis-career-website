<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>彭韋諾 · 設備工程師履歷</title>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #07090f;
    font-family: 'Outfit', 'Noto Sans TC', sans-serif;
    color: #eef2ff;
}

/* 導航 */
nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1rem 3rem;
    background: rgba(7, 9, 15, 0.9);
    backdrop-filter: blur(12px);
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 1px solid rgba(100, 255, 218, 0.2);
    flex-wrap: wrap;
}

.logo {
    font-size: 1.4rem;
    font-weight: 700;
    background: linear-gradient(135deg, #e2e8f0, #64ffda);
    background-clip: text;
    -webkit-background-clip: text;
    color: transparent;
}

.nav-links {
    display: flex;
    gap: 1.5rem;
    align-items: center;
}

.nav-links a {
    color: #b4c2e0;
    text-decoration: none;
    transition: 0.2s;
}

.nav-links a:hover {
    color: #64ffda;
}

.back-home {
    background: rgba(100, 255, 218, 0.1);
    border: 1px solid #64ffda;
    padding: 0.4rem 1.2rem;
    border-radius: 60px;
    color: #64ffda;
}

.back-home:hover {
    background: #64ffda;
    color: #07090f;
}

/* Hero */
.hero {
    text-align: center;
    padding: 4rem 2rem;
    background: radial-gradient(ellipse at 50% 0%, rgba(100,255,218,0.08), transparent);
}

.hero h1 {
    font-size: 3rem;
    font-weight: 700;
    background: linear-gradient(135deg, #ffffff, #64ffda);
    background-clip: text;
    -webkit-background-clip: text;
    color: transparent;
}

.hero p {
    color: #94a3b8;
    margin-top: 0.5rem;
}

/* 區塊 */
.section {
    max-width: 1100px;
    margin: 0 auto;
    padding: 3rem 2rem;
    border-bottom: 1px solid rgba(100, 255, 218, 0.1);
}

.section h2 {
    font-size: 1.6rem;
    margin-bottom: 1.8rem;
    display: flex;
    align-items: center;
    gap: 0.6rem;
    color: #64ffda;
}

.cards {
    display: flex;
    gap: 1.5rem;
    flex-wrap: wrap;
}

.card {
    flex: 1;
    min-width: 220px;
    background: rgba(20, 26, 42, 0.6);
    border-radius: 1.5rem;
    padding: 1.5rem;
    border: 1px solid rgba(100, 255, 218, 0.1);
    transition: 0.25s;
}

.card:hover {
    border-color: rgba(100, 255, 218, 0.4);
    transform: translateY(-3px);
}

.card h3 {
    color: #64ffda;
    margin-bottom: 0.8rem;
}

</body>
</html>
